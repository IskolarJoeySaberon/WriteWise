<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- Prevent theme flash: set dark-mode early before CSS loads -->
    <script>
      (function () {
        try {
          var saved = localStorage.getItem("theme");
          if (saved === "dark") {
            document.documentElement.classList.add("dark-mode");
            document.write("<style>html{background:#121212}</style>");
          } else {
            document.write("<style>html{background:#ffffff}</style>");
          }
        } catch (e) {}
      })();
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tutorials — Redirecting to Learning Hub</title>
    <meta http-equiv="refresh" content="0; url=learning.html#tutorials" />
    <link rel="stylesheet" href="../css/style.css" />
  </head>
  <body
    style="
      font-family: inherit;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
    "
  >
    <div style="text-align: center; max-width: 500px; padding: 24px">
      <h2>Tutorials moved to the Learning Hub</h2>
      <p>
        Tutorials are now available inside the unified
        <a href="learning.html#tutorials">Learning hub</a>. You will be
        redirected shortly.
      </p>
      <p>
        If nothing happens, click
        <a href="learning.html#tutorials">this link</a>.
      </p>
    </div>
    <script>
      try {
        location.replace("learning.html#tutorials");
      } catch (e) {
        window.location.href = "learning.html#tutorials";
      }
    </script>
    <script defer src="../js/site-utils.js"></script>
    <script defer src="../js/responsive-embeds.js"></script>
    <script defer src="../js/header-mobile.js"></script>
  </body>
</html>

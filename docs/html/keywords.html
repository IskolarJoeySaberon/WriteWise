<!doctype html>
<html lang="en">
  <head>
    <!-- Prevent theme flash: set dark-mode early before CSS loads -->
    <script>
      (function () {
        try {
          var saved = localStorage.getItem("theme");
          if (saved === "dark") {
            document.documentElement.classList.add("dark-mode");
            document.write("<style>html{background:#121212}</style>");
          } else {
            document.write("<style>html{background:#ffffff}</style>");
          }
        } catch (e) {}
      })();
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Research Suggestion Tool</title>

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
  </head>

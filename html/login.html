<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign In / Log In - WriteWise</title>
    <link rel="stylesheet" href="css/login.css" />
    <!-- Font Awesome for social icons -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <script defer src="js/site-utils.js"></script>
  </head>
  <body>
    <div class="login-page-container">
      <header class="login-header">
        <h1>Welcome to WriteWise</h1>
        <!-- Dark Mode Toggle Button -->
        <button
          id="themeToggleLogin"
          class="theme-toggle-btn"
          aria-label="Toggle dark mode"
        >
          <i class="fa-solid fa-moon"></i>
        </button>
      </header>

      <main class="login-main-content">
        <!-- Toggle Tabs -->
        <div class="form-toggle-tabs">
          <button id="showLoginBtnTab" class="toggle-btn active">Log In</button>
          <button id="showSignUpBtnTab" class="toggle-btn">Sign Up</button>
        </div>

        <!-- Social Login Section -->
        <div class="social-login">
          <button class="social-btn google-btn">
            <img src="images/google.jpg" alt="Google" class="social-icon" />
            Continue with Google
          </button>
          <button class="social-btn facebook-btn">
            <i class="fab fa-facebook-f"></i> Continue with Facebook
          </button>
          <button class="social-btn github-btn">
            <i class="fab fa-github"></i> Continue with GitHub
          </button>
        </div>

        <div class="divider"><span>or</span></div>

        <!-- Log In Form -->
        <form id="loginForm" class="auth-form">
          <h2>Log In</h2>
          <div class="form-group">
            <label for="loginEmail">Email or Username:</label>
            <input type="text" id="loginEmail" name="loginEmail" required />
          </div>

          <div class="form-group">
            <label for="loginPassword">Password:</label>
            <input
              type="password"
              id="loginPassword"
              name="loginPassword"
              required
            />
            <div class="show-password-option">
              <input type="checkbox" id="loginShowPasswordCheck" />
              <label for="loginShowPasswordCheck">Show password</label>
            </div>
          </div>

          <div class="form-options">
            <label class="remember-me">
              <input type="checkbox" name="remember" />
              <span class="remember-me-text">Remember Me</span>
            </label>
            <a href="reset-password.html" class="forgot-password-link"
              >Forgot password?</a
            >
          </div>

          <button type="submit" class="submit-btn">Log In</button>
          <p class="form-message" id="loginMessage"></p>
        </form>

        <!-- Sign Up Form -->
        <form id="signUpForm" class="auth-form" style="display: none">
          <h2>Sign Up</h2>
          <div class="form-group">
            <label for="signUpUsername">Username:</label>
            <input
              type="text"
              id="signUpUsername"
              name="signUpUsername"
              required
            />
            <small class="feedback" id="usernameFeedback"></small>
          </div>

          <div class="form-group">
            <label for="signUpEmail">Email:</label>
            <input type="email" id="signUpEmail" name="signUpEmail" required />
            <small class="feedback" id="emailFeedback"></small>
          </div>

          <div class="form-group">
            <label for="signUpPassword">Password:</label>
            <input
              type="password"
              id="signUpPassword"
              name="signUpPassword"
              required
            />
            <div class="show-password-option">
              <input type="checkbox" id="signUpShowPasswordCheck" />
              <label for="signUpShowPasswordCheck">Show password</label>
            </div>
            <div class="password-strength">
              <div id="strengthBar"></div>
            </div>
            <small class="feedback" id="passwordFeedback"></small>
          </div>

          <div class="form-group">
            <label for="signUpConfirmPassword">Confirm Password:</label>
            <input
              type="password"
              id="signUpConfirmPassword"
              name="signUpConfirmPassword"
              required
            />
            <div class="show-password-option">
              <input type="checkbox" id="signUpConfirmShowPasswordCheck" />
              <label for="signUpConfirmShowPasswordCheck">Show password</label>
            </div>
            <small class="feedback" id="confirmPasswordFeedback"></small>
          </div>

          <div class="form-group terms">
            <label>
              <input type="checkbox" id="termsCheck" required />
              I agree to the <a>Terms</a> and <a>Privacy Policy</a>
            </label>
          </div>

          <button type="submit" class="submit-btn">Sign Up</button>
          <p class="form-message" id="signUpMessage"></p>
        </form>
      </main>

      <footer class="login-footer">
        <p>© 2025 WriteWise</p>
      </footer>
    </div>

    <!-- Ensure script loads after DOM -->
    <script src="js/login.js" defer></script>
    <script defer src="js/responsive-embeds.js"></script>
  </body>
</html>

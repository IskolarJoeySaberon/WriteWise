<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reset Password - WriteWise</title>
    <link rel="stylesheet" href="css/reset-password.css" />
  </head>
  <body>
    <div class="reset-container">
      <div class="reset-card">
        <h2>Reset Your Password</h2>
        <p class="reset-info">
          Enter your email address and we’ll send you a link to reset your
          password.
        </p>
        <form id="resetForm">
          <div class="form-group">
            <label for="resetEmail">Email Address:</label>
            <input
              type="email"
              id="resetEmail"
              name="resetEmail"
              placeholder="you@example.com"
              required
            />
          </div>
          <button type="submit" class="reset-btn">Send Reset Link</button>
          <p class="form-message" id="resetMessage"></p>
        </form>
        <a href="login.html" class="back-link">Back to Login</a>
      </div>
    </div>
    <script src="js/reset-password.js" defer></script>
    <script defer src="js/site-utils.js"></script>
    <script defer src="js/responsive-embeds.js"></script>
  </body>
</html>
